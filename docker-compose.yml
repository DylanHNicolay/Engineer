services:
  bot:
    build: ./Bot
    env_file: .env
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - bot-network

  db:
    build:
      context: .
      dockerfile: Database/Dockerfile
    env_file: .env
    restart: unless-stopped
    networks:
      - bot-network

